name: Build and Deploy to Yandex Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
  release:
    types: [published]

env:
  CONTAINER_NAME: copykit-fastapi
  IMAGE_NAME: copykit-fastapi
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Yandex Cloud CLI
        run: |
          set -ex
          mkdir -p $HOME/.local/bin
          
          # Download installer
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh -o /tmp/install-yc.sh
          chmod +x /tmp/install-yc.sh
          
          # Run installer (adds to ~/.bashrc)
          /tmp/install-yc.sh -a
          
          # Source bashrc to get yc in PATH
          source ~/.bashrc
          
          # Verify yc is in PATH
          which yc || (echo "YC not found in PATH" && exit 1)
          yc --version
          
          # Setup configs
          mkdir -p ~/.config/yc
          cat > ~/.config/yc/sa-key.json << 'EOFKEY'
          ${{ secrets.YC_SERVICE_ACCOUNT_KEY }}
          EOFKEY
          
          # Configure yc
          yc config set service-account-key ~/.config/yc/sa-key.json
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          yc --version

      - name: Configure Docker for Yandex Cloud
        run: |
          set -e
          source ~/.bashrc
          yc container registry configure-docker

      - name: Build Docker image
        run: |
          set -e
          docker build -t $IMAGE_NAME:latest .
          docker tag $IMAGE_NAME:latest cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:latest

      - name: Test Docker image
        run: |
          set -e
          docker run -d --name test --env GIGA_API=test --env MAX_INPUT_LENGTH=100 -p 8080:8080 $IMAGE_NAME:latest uvicorn app.copykit_api:app --host 0.0.0.0 --port 8080
          sleep 5
          curl -f http://localhost:8080/docs || (docker logs test && exit 1)
          docker stop test || true
          docker rm test || true

      - name: Deploy to Yandex Cloud
        run: |
          set -e
          source ~/.bashrc
          yc serverless container revision deploy \
            --container-name $CONTAINER_NAME \
            --image cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:latest \
            --cores 1 \
            --memory 512MB \
            --concurrency 5 \
            --execution-timeout 60s \
            --service-account-id ${{ secrets.YC_SERVICE_ACCOUNT_ID }} \
            --environment GIGA_API=${{ secrets.GIGA_API }},MAX_INPUT_LENGTH=100

      - name: Get container URL
        run: |
          set -e
          source ~/.bashrc
          yc serverless container get $CONTAINER_NAME --format=json | jq '.url'