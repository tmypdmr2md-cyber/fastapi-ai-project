name: Build and Deploy to Yandex Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
  release:
    types: [published]

env:
  CONTAINER_NAME: copykit-fastapi
  IMAGE_NAME: copykit-fastapi
  # Эта переменная нужна только если вы используете старые экшены JS, для yc-cli она не обязательна, но пусть будет
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Yandex Cloud CLI
        run: |
          set -e
          
          # 1. Install yc
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          
          # 2. Add to PATH
          export PATH="$PATH:$HOME/yandex-cloud/bin"
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
          
          # 3. Verify
          yc --version
          
          # 4. Setup Service Account Key - ВАЖНО: активируем профиль default
          mkdir -p ~/.config/yc
          cat > ~/.config/yc/sa-key.json << 'EOFKEY'
          ${{ secrets.YC_SERVICE_ACCOUNT_KEY }}
          EOFKEY
          
          # Активируем профиль default и настраиваем ключ именно в нём
          yc config profile activate default
          yc config set service-account-key ~/.config/yc/sa-key.json
          
          # 5. Set folder ID
          if [ ! -z "${{ secrets.YC_FOLDER_ID }}" ]; then
            yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          fi
          
          # 6. Verify auth
          echo "✓ Testing IAM token..."
          yc iam create-token | head -c 30
          echo "..."

      - name: Configure Docker for Yandex Cloud
        run: |
          set -e
          # Эта команда использует текущий активный профиль (default)
          yc container registry configure-docker
          
          # Проверка
          echo "✓ Docker config:"
          cat ~/.docker/config.json | jq '.auths."cr.yandex"'

      - name: Build Docker image
        run: |
          set -e
          docker build -t $IMAGE_NAME:latest .
          docker tag $IMAGE_NAME:latest cr.yandex.ru/crpnf0rvfiv5edm37kfc/$IMAGE_NAME:latest

      - name: Test Docker image
        run: |
          set -e
          # Запускаем контейнер
          docker run -d --name test-container \
            --env GIGA_API=test \
            --env MAX_INPUT_LENGTH=100 \
            -p 8080:8080 \
            $IMAGE_NAME:latest \
            uvicorn app.copykit_api:app --host 0.0.0.0 --port 8080
          
          # Ждем запуска
          sleep 5
          
          # Проверяем здоровье
          if ! curl -f http://localhost:8080/docs; then
            echo "Health check failed. Logs:"
            docker logs test-container
            exit 1
          fi
          
          # Очистка
          docker stop test-container || true
          docker rm test-container || true

      - name: Push to Yandex Container Registry
        run: |
          set -e
          docker push cr.yandex.ru/crpnf0rvfiv5edm37kfc/$IMAGE_NAME:latest

      - name: Deploy to Yandex Cloud
        run: |
          set -e
          yc serverless container revision deploy \
            --container-name $CONTAINER_NAME \
            --image cr.yandex.ru/crpnf0rvfiv5edm37kfc/$IMAGE_NAME:latest \
            --cores 1 \
            --memory 512MB \
            --concurrency 5 \
            --execution-timeout 60s \
            --service-account-id ${{ secrets.YC_SERVICE_ACCOUNT_ID }} \
            --environment GIGA_API=${{ secrets.GIGA_API }},MAX_INPUT_LENGTH=100

      - name: Get container URL
        run: |
          set -e
          URL=$(yc serverless container get --name $CONTAINER_NAME --format json | jq -r '.url')
          echo "Container is available at: $URL"