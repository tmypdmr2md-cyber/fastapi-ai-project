name: Build and Deploy to Yandex Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
  release:
    types: [published]

env:
  CONTAINER_NAME: copykit-fastapi
  IMAGE_NAME: copykit-fastapi

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Yandex Cloud CLI
        run: |
          set -e
          echo "Installing Yandex Cloud CLI..."
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          
          # Add to PATH
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
          echo "Creating YC config directory..."
          mkdir -p ~/.config/yc
          
          echo '${{ secrets.YC_SERVICE_ACCOUNT_KEY }}' > ~/.config/yc/sa-key.json
          
          echo "Configuring YC CLI..."
          yc config set service-account-key ~/.config/yc/sa-key.json
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          
      - name: Log in to Yandex Container Registry
        run: |
          set -e
          echo "Configuring Docker for Yandex Container Registry..."
          export PATH="$HOME/.local/bin:$PATH"
          yc container registry configure-docker
          echo "✅ Docker configured for YC registry"yc
      - name: Log in to Yandex Container Registry
      - name: Build Docker image
        run: |
          set -e
          echo "Building Docker image..."
          docker build -t $IMAGE_NAME:latest .
          
          echo "Tagging for Yandex Container Registry..."
          docker tag $IMAGE_NAME:latest cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:latest
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            docker tag $IMAGE_NAME:latest cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:${TAG}
            echo "Tagged with version: ${TAG}"
          fi
      - name: Test Docker image locally
        run: |
          set -e
          echo "Starting Docker container for testing..."
          docker run -d \
            --name test-container \
            --env GIGA_API="test_key" \
            --env MAX_INPUT_LENGTH="100" \
            -p 8080:8080 \
            $IMAGE_NAME:latest \
            uvicorn app.copykit_api:app --host 0.0.0.0 --port 8080
          
          echo "Waiting for server to start..."
          sleep 5
          
          echo "Testing /docs endpoint..."
          if curl -f http://localhost:8080/docs; then
            echo "✅ Local test passed"
          else
            echo "❌ Local test failed"
            docker logs test-container
            exit 1
          fi
          ндарт для FastAPI)
          curl -f http://localhost:8080/docs || exit 1
          
          echo "✅ Local test passed"
      - name: Push to Yandex Container Registry
        run: |
          set -e
          echo "Pushing image to registry..."
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:latest
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:${TAG}
            echo "Pushed version tag: ${TAG}"
      - name: Deploy to Yandex Cloud Serverless Container
        run: |
          set -e
          export PATH="$HOME/.local/bin:$PATH"
          
          IMAGE_TAG="latest"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            IMAGE_TAG=${GITHUB_REF#refs/tags/}
          fi
          
          echo "Deploying with image tag: ${IMAGE_TAG}"
          
          yc serverless container revision deploy \
            --container-name $CONTAINER_NAME \
            --image cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:${IMAGE_TAG} \
            --cores 1 \
            --memory 512MB \
            --concurrency 5 \
            --execution-timeout 60s \
            --service-account-id ${{ secrets.YC_SERVICE_ACCOUNT_ID }} \
            --environment GIGA_API=${{ secrets.GIGA_API }},MAX_INPUT_LENGTH=100 \
            --no-user-output
          
          echo "✅ Container deployed" $CONTAINER_NAME \
            --image cr.yandex/${{ secrets.YC_REGISTRY_ID }}/$IMAGE_NAME:${IMAGE_TAG} \
      - name: Get container URL
        run: |
          set -e
          export PATH="$HOME/.local/bin:$PATH"
          
          echo "Fetching container URL..."
          URL=$(yc serverless container get $CONTAINER_NAME --format=json | jq -r '.url')
          
          echo "✅ Deployment completed!"
          echo "Container: $CONTAINER_NAME"
          echo "URL: $URL"
          echo "container_url=$URL" >> $GITHUB_OUTPUT
