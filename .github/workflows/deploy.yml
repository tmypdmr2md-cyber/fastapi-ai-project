name: Build and Deploy to Yandex Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
  release:
    types: [published]

env:
  CONTAINER_NAME: copykit-fastapi
  IMAGE_NAME: copykit-fastapi
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Yandex Cloud CLI
        run: |
          set -ex
          
          # Run installer
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          
          # YC installs to ~/yandex-cloud/bin - add to PATH
          export PATH="$PATH:$HOME/yandex-cloud/bin"
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
          
          # Verify yc is available
          $HOME/yandex-cloud/bin/yc --version
          
          # Setup configs
          mkdir -p ~/.config/yc
          cat > ~/.config/yc/sa-key.json << 'EOFKEY'
          ${{ secrets.YC_SERVICE_ACCOUNT_KEY }}
          EOFKEY
          
          # Configure yc
          $HOME/yandex-cloud/bin/yc config set service-account-key ~/.config/yc/sa-key.json
          
          # Only set folder-id if it's provided
          if [ ! -z "${{ secrets.YC_FOLDER_ID }}" ]; then
            $HOME/yandex-cloud/bin/yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          fi

      - name: Configure Docker for Yandex Cloud
        run: |
          set -e
          $HOME/yandex-cloud/bin/yc container registry configure-docker

      - name: Build Docker image
        run: |
          set -e
          docker build -t $IMAGE_NAME:latest .
          docker tag $IMAGE_NAME:latest cr.yandex.ru/crpnf0rvfiv5edm37kfc/$IMAGE_NAME:latest

      - name: Test Docker image
        run: |
          set -e
          docker run -d --name test --env GIGA_API=test --env MAX_INPUT_LENGTH=100 -p 8080:8080 $IMAGE_NAME:latest uvicorn app.copykit_api:app --host 0.0.0.0 --port 8080
          sleep 5
          curl -f http://localhost:8080/docs || (docker logs test && exit 1)
          docker stop test || true
          docker rm test || true

      - name: Push to Yandex Container Registry
        run: |
          set -e
          docker push cr.yandex.ru/crpnf0rvfiv5edm37kfc/$IMAGE_NAME:latest

      - name: Deploy to Yandex Cloud
        run: |
          set -e
          $HOME/yandex-cloud/bin/yc serverless container revision deploy \
            --container-name $CONTAINER_NAME \
            --image cr.yandex.ru/crpnf0rvfiv5edm37kfc/$IMAGE_NAME:latest \
            --cores 1 \
            --memory 512MB \
            --concurrency 5 \
            --execution-timeout 60s \
            --service-account-id ${{ secrets.YC_SERVICE_ACCOUNT_ID }} \
            --environment GIGA_API=${{ secrets.GIGA_API }},MAX_INPUT_LENGTH=100

      - name: Get container URL
        run: |
          set -e
          $HOME/yandex-cloud/bin/yc serverless container get --name $CONTAINER_NAME --format json | grep -o '"url":"[^"]*' | cut -d'"' -f4